<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Clipboard</title>
<script>
  document.documentElement.dataset.theme = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
</script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site/shared/clipboard-popup.css">
<style>
  :root { color-scheme:dark; --bg: #0c0c0c; --surface: #131313; --surface2: #1a1a1a; --input:#0a0a0a; --text: #ccc; --text-dim: #555;
          --line:#222; --line-strong:#333; --line-soft:#111; --hover:#ffffff10; --hover-strong:#252525; --accent-bg:#1a1030; --accent-bg-strong:#251545; --active-fg:#000; --shadow:rgba(0,0,0,.5);
          --accent: #a78bfa; --green: #34d399; --green-bg:#0f2a1f; --red: #f87171; --pin: #f59e0b;
          --glass-bg:rgba(19,19,19,.72); --glass-input:rgba(10,10,10,.72); --glass-border:rgba(255,255,255,.1); --glass-blur:blur(14px) saturate(1.35);
          --list-scrollbar-width: thin; --list-scrollbar-size: 8px; --list-scrollbar-thumb: var(--line-strong); --list-scrollbar-thumb-hover: var(--text-dim); --list-scrollbar-border: 2px solid var(--surface); }
  :root[data-theme="light"] { color-scheme:light; --bg:#f4f4f5; --surface:#ffffff; --surface2:#f4f4f5; --input:#ffffff; --text:#18181b; --text-dim:#71717a;
          --line:#e4e4e7; --line-strong:#d4d4d8; --line-soft:#ececef; --hover:#00000008; --hover-strong:#e4e4e7; --accent-bg:#f1ecff; --accent-bg-strong:#e6dcff; --active-fg:#fff; --shadow:rgba(24,24,27,.14);
          --accent:#7c3aed; --green:#059669; --green-bg:#dcfce7; --red:#dc2626; --pin:#d97706; --glass-bg:rgba(255,255,255,.72); --glass-input:rgba(255,255,255,.62); --glass-border:rgba(24,24,27,.12); }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--glass-bg); color:var(--text); display:flex; flex-direction:column; backdrop-filter:var(--glass-blur); -webkit-backdrop-filter:var(--glass-blur); }
  @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
    body { background:var(--surface); }
  }
  ::-webkit-scrollbar { width:0; }
  #popupShell { flex:1; min-height:0; height:100%; display:flex; flex-direction:column; overflow:hidden; }

  mark { background:rgba(167,139,250,.2); color:#c4b5fd; border-radius:2px; padding:0 1px; }
  .toast { position:fixed; bottom:16px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--green); color:var(--active-fg);
           padding:6px 16px; border-radius:16px; font-size:12px; font-weight:500; opacity:0; transition:all .2s; pointer-events:none; z-index:50; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  /* Confirm dialog */
  .overlay { display:none; pointer-events:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:30; align-items:center; justify-content:center; }
  .overlay.show { display:flex; pointer-events:auto; }
  .dialog { background:var(--surface); border:1px solid var(--line-strong); border-radius:10px; padding:16px 20px; max-width:320px; width:90%; box-shadow:0 8px 24px var(--shadow); }
  .dialog h3 { font-size:13px; font-weight:500; margin-bottom:6px; }
  .dialog p { font-size:11px; color:var(--text-dim); margin-bottom:12px; font-family:'Cascadia Code',monospace; word-break:break-word; }
  .dialog-btns { display:flex; gap:8px; justify-content:flex-end; }
  .dialog-btns button { border:none; border-radius:6px; padding:6px 16px; cursor:pointer; font-size:12px; transition:all .15s; }
  .btn-confirm { background:var(--green); color:var(--active-fg); }
  .btn-confirm:hover { filter:brightness(1.1); }
  .btn-cancel { background:var(--line); color:var(--text-dim); }
  .btn-cancel:hover { background:var(--line-strong); color:var(--text); }
  .prompt-input { width:100%; background:var(--input); border:1px solid var(--line); border-radius:4px;
                  padding:7px 10px; color:var(--text); font-size:13px; outline:none;
                  margin-bottom:12px; font-family:inherit; }
  .prompt-input:focus { border-color:var(--accent); }

  .settings-hdr { -webkit-app-region:drag; }
  .settings-hdr button { -webkit-app-region:no-drag; }
  .shortcut-row { align-items:flex-start; gap:10px; }
  .shortcut-row > label { padding-top:6px; flex-shrink:0; }
  .shortcut-control { display:flex; align-items:center; justify-content:flex-end; gap:6px; min-width:0; }
  .shortcut-btn { min-width:130px; max-width:190px; background:var(--input); border:1px solid var(--line); border-radius:4px; color:var(--text);
                  padding:5px 8px; font-size:11px; font-family:'Cascadia Code','Consolas',monospace; white-space:nowrap; overflow:hidden;
                  text-overflow:ellipsis; cursor:pointer; text-align:left; }
  .shortcut-btn:hover { border-color:var(--accent); }
  .shortcut-btn.recording { border-color:var(--accent); color:var(--accent); background:var(--accent-bg); }
  .shortcut-reset .mi { font-size:14px; }
  .shortcut-status { min-height:14px; font-size:10px; color:var(--text-dim); margin-top:-4px; }
  .shortcut-status.error { color:var(--red); }
  .settings-footer { margin-top:24px; padding:12px 0 8px; border-top:1px solid var(--line); }
  .settings-footer-actions { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .settings-clear { border:1px solid var(--red); background:transparent; color:var(--red); padding:6px 14px; border-radius:6px; cursor:pointer; font-size:11px; font-weight:500; }
  .settings-clear:hover { background:var(--red); color:var(--active-fg); }
  .settings-secondary { border:1px solid var(--line-strong); background:transparent; color:var(--text-dim); padding:6px 12px; border-radius:6px; cursor:pointer; font-size:11px; font-weight:500; }
  .settings-secondary:hover { border-color:var(--accent); color:var(--accent); }
  .sync-add-folder { width:100%; margin-top:6px; }
  .add-group-btn { background:none; border:1px dashed var(--line-strong); border-radius:4px; color:var(--text-dim); cursor:pointer; font-size:11px;
                   padding:6px; width:100%; margin-top:4px; transition:all .15s; }
  .add-group-btn:hover { border-color:var(--accent); color:var(--accent); }
  .sync-row, .settings-action-row { display:flex; align-items:flex-start; gap:6px; padding:6px 0; min-width:0; }
  .sync-btn, .settings-icon-btn { background:none; border:1px solid var(--line-strong); border-radius:4px; color:var(--text-dim); cursor:pointer;
              font-size:11px; padding:4px 8px; transition:all .15s; white-space:nowrap; flex-shrink:0; }
  .sync-btn:hover, .settings-icon-btn:hover { border-color:var(--accent); color:var(--accent); }
  .sync-btn:disabled, .settings-icon-btn:disabled { opacity:.45; cursor:not-allowed; }
  .sync-btn:disabled:hover, .settings-icon-btn:disabled:hover { border-color:var(--line-strong); color:var(--text-dim); }
  .sync-status, .settings-status { font-size:10px; color:var(--text-dim); margin-top:2px; }
  .sync-status.active, .settings-status.active { color:var(--green); }
  .sync-status.error, .settings-status.error { color:var(--red); }
  .build-info { display:flex; flex-direction:column; gap:2px; min-width:0; max-width:100%; overflow:hidden; font-size:10px; color:var(--text-dim); margin-top:12px; font-family:'Cascadia Code','Consolas',monospace; }
  .build-info-line { display:block; max-width:100%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
</style></head><body>

<div id="popupShell"></div>

<div class="overlay" id="confirmOverlay">
  <div class="dialog">
    <h3 id="confirmTitle"></h3>
    <p id="confirmMsg"></p>
    <div class="dialog-btns">
      <button class="btn-cancel" id="confirmNo">Cancel</button>
      <button class="btn-confirm" id="confirmYes">Replace</button>
    </div>
  </div>
</div>

<div class="overlay" id="promptOverlay">
  <div class="dialog">
    <h3 id="promptTitle"></h3>
    <input class="prompt-input" id="promptInput" type="text" autocomplete="off" spellcheck="false">
    <div class="dialog-btns">
      <button class="btn-cancel" id="promptNo">Cancel</button>
      <button class="btn-confirm" id="promptYes">OK</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">Copied</div>

<script src="site/shared/clipboard-ui-core.js"></script>
<script>
const Core = window.BoardClipCore;
document.getElementById('popupShell').innerHTML = Core.renderPopupShell({
  headerActionsHtml: `
    <button class="icon-btn accent" id="syncHeaderBtn" type="button" title="Sync now" aria-label="Sync now"><span class="mi">sync</span></button>
  `,
  settingsBodyHtml: `
    <label class="setting-row switch-row" for="autoLaunch">
      <span>Launch on startup</span>
      <input id="autoLaunch" type="checkbox">
      <span class="switch" aria-hidden="true"></span>
    </label>
    <div class="setting-row shortcut-row">
      <label>Popup shortcut</label>
      <div class="shortcut-control">
        <button class="shortcut-btn" id="shortcutRecord" type="button"></button>
        <button class="icon-btn shortcut-reset" id="shortcutReset" title="Reset shortcut" type="button"><span class="mi">restart_alt</span></button>
      </div>
    </div>
    <div class="shortcut-status" id="shortcutStatus"></div>
    <div class="setting-row shortcut-row">
      <label>Quick paste</label>
      <div class="shortcut-control">
        <button class="shortcut-btn" id="quickPasteRecord" type="button"></button>
        <button class="icon-btn shortcut-reset" id="quickPasteReset" title="Reset quick paste shortcut" type="button"><span class="mi">restart_alt</span></button>
      </div>
    </div>
    <div class="shortcut-status" id="quickPasteStatus"></div>
    <div class="setting-row"><label>Max age (days)</label><input id="maxAge" type="number" min="1"></div>
    <div class="setting-row"><label>Max size (GB)</label><input id="maxSize" type="number" min="0.1" step="0.1"></div>
    <div class="settings-usage" id="usage"></div>
    <div class="settings-section">
      <h3>Numpad Shortcuts</h3>
      <div id="numpadSlots"></div>
    </div>
    <div class="settings-section">
      <h3>Sync</h3>
      <div class="sync-row">
        <div class="sync-list" id="syncAccounts"></div>
        <button class="sync-btn" id="syncNow" title="Sync now"><span class="mi" style="font-size:14px;vertical-align:middle">sync</span></button>
      </div>
      <button class="settings-secondary sync-add-folder" id="addSyncFolder" type="button"><span class="mi" style="font-size:14px;vertical-align:middle">create_new_folder</span> Add sync folder</button>
      <div class="sync-status" id="syncStatus"></div>
      <label class="setting-row switch-row" for="p2pEnabled">
        <span>Local network fast sync</span>
        <input id="p2pEnabled" type="checkbox">
        <span class="switch" aria-hidden="true"></span>
      </label>
      <div class="sync-status" id="p2pStatus"></div>
    </div>
    <div class="settings-section">
      <h3>Updates</h3>
      <div class="settings-action-row">
        <div class="settings-action-list">
          <div class="settings-action-card">
            <span class="settings-action-main">
              <span class="settings-action-title" id="updateBuild"></span>
              <span class="settings-action-detail" id="updateDetail"></span>
            </span>
          </div>
        </div>
        <button class="settings-icon-btn" id="updateNow" title="Check for updates"><span class="mi" style="font-size:14px;vertical-align:middle">system_update_alt</span></button>
      </div>
      <div class="settings-status" id="updateStatus"></div>
    </div>
    <div class="settings-section">
      <h3>Diagnostics</h3>
      <label class="setting-row switch-row" for="diagnosticsEnabled">
        <span>Performance logging</span>
        <input id="diagnosticsEnabled" type="checkbox">
        <span class="switch" aria-hidden="true"></span>
      </label>
      <div class="settings-status" id="diagnosticsStatus"></div>
    </div>
    <div class="settings-section">
      <h3>Groups</h3>
      <div id="groupSlots"></div>
      <button class="add-group-btn" id="addGroupBtn"><span class="mi" style="font-size:14px;vertical-align:middle">add</span> New Group</button>
    </div>
    <div class="settings-footer">
      <div class="settings-footer-actions">
        <button class="settings-clear" id="clearAll">Clear All</button>
        <button class="settings-secondary" id="copyDiagnostics">Copy Diagnostics</button>
      </div>
      <div class="build-info" id="buildInfo"></div>
    </div>
  `,
});
const listEl = document.getElementById('list');
const toast = document.getElementById('toast');
const searchEl = document.getElementById('search');
const countEl = document.getElementById('count');
const regexBtn = document.getElementById('regexBtn');
let toastTimer, items = [], expanded = new Set(), query = '', regexOn = false, selectedIdx = -1;
const BATCH = 30;
const COLLAPSED_PREVIEW_CHARS = 700;
const SEARCH_PREVIEW_CONTEXT = 260;
let rendered = 0, filtered = [];
let groups = [], activeFilters = new Set();
let dataRevision = -1;
let diagnosticsEnabled = false;
let searchTexts = [], searchTextLower = [];
let itemLookup = new Map(), groupCounts = new Map(), builtinCounts = {}, numpadIdMap = {};

function recordRendererPerf(event, startedAt, details = {}, thresholdMs = 50) {
  const ms = performance.now() - startedAt;
  if (!diagnosticsEnabled && ms < thresholdMs) return ms;
  const promise = window.api.recordDiagnostics?.(event, {
    ...details,
    ms: Math.round(ms),
    items: items.length,
    filtered: filtered.length,
    query_length: query.length,
    filters: activeFilters.size,
    slow: ms >= thresholdMs,
  });
  if (promise && promise.catch) promise.catch(() => {});
  return ms;
}

function applyColorScheme(scheme) {
  document.documentElement.dataset.theme = scheme === 'light' ? 'light' : 'dark';
}
if (window.api.getColorScheme) window.api.getColorScheme().then(applyColorScheme).catch(() => {});
if (window.api.onColorSchemeChanged) window.api.onColorSchemeChanged(applyColorScheme);

// --- Helpers ---
function ago(ts) { return Core.ago(ts); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function queryMatchIndex(text, q) {
  const queryText = String(q || '').trim();
  if (!queryText) return -1;
  if (regexOn) {
    try {
      const match = new RegExp(queryText, 'i').exec(text);
      return match ? match.index : -1;
    } catch { return -1; }
  }
  return String(text || '').toLowerCase().indexOf(queryText.toLowerCase());
}
function collapsedPreviewText(text, q) {
  const singleLine = String(text || '').replace(/\r?\n/g, ' ');
  if (singleLine.length <= COLLAPSED_PREVIEW_CHARS) return singleLine;
  const matchIndex = queryMatchIndex(singleLine, q);
  const center = matchIndex >= 0 ? Math.max(0, matchIndex - SEARCH_PREVIEW_CONTEXT) : 0;
  const start = Math.min(center, Math.max(0, singleLine.length - COLLAPSED_PREVIEW_CHARS));
  const end = Math.min(singleLine.length, start + COLLAPSED_PREVIEW_CHARS);
  return `${start > 0 ? '...' : ''}${singleLine.slice(start, end)}${end < singleLine.length ? '...' : ''}`;
}
function providerName(acc) {
  const provider = acc && acc.provider ? String(acc.provider) : 'cloud';
  return provider.charAt(0).toUpperCase() + provider.slice(1);
}
function syncAccountLabel(acc) {
  if (acc && acc.provider === 'custom') return `Custom folder · ${acc.label || acc.path}`;
  return `${providerName(acc)} · ${acc.label || acc.email || acc.path}`;
}
function highlight(text, q) {
  const raw = String(text || '');
  const queryText = String(q || '').trim();
  if (!queryText) return esc(raw);
  try {
    const re = regexOn ? new RegExp(queryText, 'gi') : new RegExp(queryText.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    let out = '';
    let last = 0;
    let count = 0;
    let match;
    while ((match = re.exec(raw)) && count < 100) {
      if (match[0] === '') {
        re.lastIndex += 1;
        continue;
      }
      out += esc(raw.slice(last, match.index));
      out += `<mark>${esc(match[0])}</mark>`;
      last = match.index + match[0].length;
      count += 1;
    }
    return out + esc(raw.slice(last));
  } catch { return esc(raw); }
}
// --- Pin model helpers ---
// item.pin: null/undefined = unpinned. Object = pinned. Shape: { number?: 1-9, groups?: string[] }
function isPinned(item) { return Core.isPinned(item); }
function numpadOf(item) { return Core.numpadOf(item); }
function groupsOf(item) { return Core.groupsOf(item); }
function isInGroup(item, g) { return Core.isInGroup(item, g); }
function itemId(item) { return Core.itemId(item); }
function itemById(id) { return itemLookup.get(id) || items.find(it => itemId(it) === id); }
function showToast(msg) { toast.textContent = msg||'Copied'; toast.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(()=>toast.classList.remove('show'),1200); }

function rebuildItemIndexes() {
  const startedAt = performance.now();
  searchTexts = [];
  searchTextLower = [];
  itemLookup = new Map();
  groupCounts = new Map();
  builtinCounts = { __pinned__: 0, __numbered__: 0, __images__: 0 };
  numpadIdMap = {};

  items.forEach((item) => {
    const id = itemId(item);
    if (id) itemLookup.set(id, item);
    if (isPinned(item)) builtinCounts.__pinned__ += 1;
    if (item && item.type === 'image') builtinCounts.__images__ += 1;
    const slot = numpadOf(item);
    if (slot != null) {
      builtinCounts.__numbered__ += 1;
      numpadIdMap[slot] = id;
    }
    groupsOf(item).forEach((group) => groupCounts.set(group, (groupCounts.get(group) || 0) + 1));
    const searchText = Core.itemSearchText(item);
    searchTexts.push(searchText);
    searchTextLower.push(searchText.toLowerCase());
  });
  recordRendererPerf('indexes.rebuild', startedAt, {
    search_text_bytes: searchTexts.reduce((sum, text) => sum + text.length, 0),
    groups: groupCounts.size,
    numbered: builtinCounts.__numbered__ || 0,
    images: builtinCounts.__images__ || 0,
  }, 75);
}

// --- Numpad slot map ---
function numpadMap() {
  return numpadIdMap;
}

// --- Group filter tags ---
function renderGroupFilters() {
  const startedAt = performance.now();
  const el = document.getElementById('groupFilters');
  el.innerHTML = Core.renderFilterBar({ items, groups, activeFilters, query, builtinCounts, groupCounts });
  recordRendererPerf('filters.render_bar', startedAt, { groups: groups.length }, 40);
}

function applyFilter() {
  const startedAt = performance.now();
  filtered = Core.filterItemIndexes(items, { query, regex: regexOn, filters: activeFilters, searchTexts, searchTextLower });
  rendered = 0;
  listEl.innerHTML = '';
  selectedIdx = -1;
  loadBatch();
  if (!filtered.length) listEl.innerHTML = `<div class="empty">${query || activeFilters.size ? 'No matches' : 'Copy something to get started'}</div>`;
  recordRendererPerf('list.apply_filter', startedAt, { rendered, regex: regexOn }, 60);
}

let rerenderFrame = null;
function rerenderList() {
  const startedAt = performance.now();
  if (rerenderFrame) {
    cancelAnimationFrame(rerenderFrame);
    rerenderFrame = null;
  }
  renderGroupFilters();
  applyFilter();
  updateCount();
  scheduleRelativeTimeRefresh();
  recordRendererPerf('list.rerender', startedAt, { rendered }, 90);
}

function scheduleRerenderList() {
  if (rerenderFrame) return;
  rerenderFrame = requestAnimationFrame(() => {
    rerenderFrame = null;
    rerenderList();
  });
}

function loadBatch() {
  const startedAt = performance.now();
  const end = Math.min(rendered + BATCH, filtered.length);
  const batch = end - rendered;
  const nmap = numpadMap();
  const frag = document.createDocumentFragment();
  for (let fi = rendered; fi < end; fi++) {
    const ri = filtered[fi];
    const it = items[ri];
    frag.appendChild(buildItem(it, ri, nmap));
  }
  listEl.appendChild(frag);
  rendered = end;
  scheduleRelativeTimeRefresh();
  recordRendererPerf('list.load_batch', startedAt, { batch, rendered }, 60);
}

let relativeTimeTimer = null;
function scheduleRelativeTimeRefresh() {
  if (relativeTimeTimer) clearTimeout(relativeTimeTimer);
  const delay = Core.updateRelativeTimes(listEl);
  if (delay) {
    relativeTimeTimer = setTimeout(scheduleRelativeTimeRefresh, delay);
  }
}

function buildItem(it, ri, nmap) {
  const id = itemId(it);
  const isImage = it.type === 'image';
  const el = document.createElement('div');
  const pickerHtml = Core.renderItemPicker(it, { items, groups, numpadMap: nmap });

  // Build group picker buttons — items can belong to multiple groups
  const actionsHtml = `${!isImage && ((it.text||'').length > 120 || /\n/.test(it.text||'')) ? `<button class="icon-btn accent" data-action="expand" data-id="${esc(id)}" title="${expanded.has(id)?'Collapse':'Expand'}"><span class="mi">${expanded.has(id)?'unfold_less':'unfold_more'}</span></button>` : ''}${isImage ? `<button class="icon-btn accent" data-action="open-img" data-id="${esc(id)}" title="Open image"><span class="mi">open_in_new</span></button><button class="icon-btn accent" data-action="save-img" data-id="${esc(id)}" title="Copy to Downloads"><span class="mi">save</span></button>` : `<button class="icon-btn accent" data-action="edit" data-id="${esc(id)}" title="Open in editor"><span class="mi">open_in_new</span></button>`}<button class="icon-btn danger" data-action="del" data-id="${esc(id)}" title="Delete"><span class="mi">close</span></button>`;
  el.innerHTML = Core.renderClipItem(it, {
    expanded: expanded.has(id),
    imageSrc: item => `clip-img:///${esc(item.image)}`,
    previewText: item => expanded.has(itemId(item)) ? item.text || '' : collapsedPreviewText(item.text || '', query),
    highlight: text => highlight(text, query),
    pickerHtml,
    actionsHtml,
  });
  return el.firstElementChild;
}

function updateCount() {
  const total = items.length;
  const visible = filtered.length;
  countEl.textContent = Core.itemCountLabel(total, visible, { query, filters: activeFilters });
}

function updateClearControls() {
  searchClear.classList.toggle('show', !!query);
  searchClear.title = activeFilters.size ? 'Clear search and filters' : 'Clear search';
}

function clearSearchAndFilters() {
  searchEl.value = '';
  query = '';
  activeFilters.clear();
  updateClearControls();
  rerenderList();
}

window.focusSearch = function() {
  searchEl.focus();
};

// --- Scroll-based lazy load ---
listEl.addEventListener('scroll', () => {
  if (rendered < filtered.length) {
    const {scrollTop, scrollHeight, clientHeight} = listEl;
    if (scrollTop + clientHeight > scrollHeight * 0.85) loadBatch();
  }
});

// --- Event delegation ---
document.addEventListener('click', async (e) => {
  const clearFilters = e.target.closest('[data-action="clear-search-filters"]');
  if (clearFilters) {
    e.stopPropagation();
    clearSearchAndFilters();
    searchEl.focus();
    return;
  }
  // Group delete x on tag
  const gtagX = e.target.closest('[data-action="delete-group"]');
  if (gtagX) {
    e.stopPropagation();
    const g = gtagX.dataset.group;
    document.getElementById('confirmTitle').textContent = `Delete group "${g}"?`;
    document.getElementById('confirmMsg').textContent = `Items will be ungrouped but not deleted.`;
    document.getElementById('confirmYes').textContent = 'Delete';
    pendingAssign = {deleteGroup: g};
    document.getElementById('confirmOverlay').classList.add('show');
    return;
  }
  // Built-in filter tags
  const ftag = e.target.closest('.filter-tag[data-filter]');
  if (ftag) {
    const f = ftag.dataset.filter;
    if (activeFilters.has(f)) { activeFilters.delete(f); }
    else activeFilters.add(f);
    rerenderList();
    return;
  }
  // Group filter tags
  const gtag = e.target.closest('.filter-tag[data-group]');
  if (gtag && !e.target.closest('[data-action="delete-group"]')) {
    const g = gtag.dataset.group;
    if (activeFilters.has(g)) activeFilters.delete(g);
    else activeFilters.add(g);
    rerenderList();
    return;
  }
  // Group picker buttons
  const gpBtn = e.target.closest('.gp-btn');
  if (gpBtn) {
    e.stopPropagation();
    if (gpBtn.dataset.action === 'add-group') {
      const item = gpBtn.closest('.item');
      if (!item) return;
      const id = item.dataset.id;
      const name = await promptDialog('New group name');
      if (name) {
        await window.api.groupCreate(name);
        const current = itemById(id);
        if (current && !isInGroup(current, name)) await window.api.groupAssign(id, name);
        await refreshGroupsAndList();
      }
    } else {
      const item = gpBtn.closest('.item');
      if (!item) return;
      window.api.groupAssign(item.dataset.id, gpBtn.dataset.group).then(refresh);
    }
    return;
  }
  // Numpad picker
  const npBtn = e.target.closest('.np-btn');
  if (npBtn) {
    e.stopPropagation();
    const n = +npBtn.dataset.n;
    const item = npBtn.closest('.item');
    if (!item) return;
    tryAssignNumpad(n, item.dataset.id);
    return;
  }
  // Star/pin
  const star = e.target.closest('[data-action="pin"]');
  if (star) { e.stopPropagation(); window.api.pin(star.dataset.id).then(refresh); return; }
  // Open image in default viewer
  const openImg = e.target.closest('[data-action="open-img"]');
  if (openImg) { e.stopPropagation(); window.api.openImage(openImg.dataset.id); return; }
  // Save image to Downloads
  const saveImg = e.target.closest('[data-action="save-img"]');
  if (saveImg) { e.stopPropagation(); window.api.copyImagePath(saveImg.dataset.id).then(d => { if(d && d.path) showToast('Path copied'); }); return; }
  // Edit in editor
  const edit = e.target.closest('[data-action="edit"]');
  if (edit) { e.stopPropagation(); window.api.openEditor(edit.dataset.id); return; }
  // Expand
  const exp = e.target.closest('[data-action="expand"]');
  if (exp) { e.stopPropagation(); const id=exp.dataset.id; expanded.has(id)?expanded.delete(id):expanded.add(id); applyFilter(); return; }
  // Delete
  const del = e.target.closest('[data-action="del"]');
  if (del) { e.stopPropagation(); window.api.deleteItem(del.dataset.id).then(refresh); return; }
  // Click item to paste
  const item = e.target.closest('.item');
  if (item) {
    window.api.pasteAndHide(item.dataset.id);
    return;
  }
});

// --- Prompt dialog (Electron disables window.prompt) ---
let activePromptCancel = null;
function promptDialog(title) {
  return new Promise((resolve) => {
    if (activePromptCancel) activePromptCancel();
    const overlay = document.getElementById('promptOverlay');
    const input = document.getElementById('promptInput');
    const yes = document.getElementById('promptYes');
    const no = document.getElementById('promptNo');
    document.getElementById('promptTitle').textContent = title;
    input.value = '';
    overlay.classList.add('show');
    setTimeout(() => input.focus(), 0);

    const cleanup = () => {
      overlay.classList.remove('show');
      yes.removeEventListener('click', onYes);
      no.removeEventListener('click', onNo);
      document.removeEventListener('keydown', onKey, true);
      if (activePromptCancel === onNo) activePromptCancel = null;
    };
    const onYes = () => { const v = input.value.trim(); cleanup(); resolve(v || null); };
    const onNo = () => { cleanup(); resolve(null); };
    const onKey = (e) => {
      if (e.key === 'Enter') { e.preventDefault(); e.stopPropagation(); onYes(); }
      else if (e.key === 'Escape') { e.preventDefault(); e.stopPropagation(); onNo(); }
    };
    yes.addEventListener('click', onYes);
    no.addEventListener('click', onNo);
    document.addEventListener('keydown', onKey, true); // capture phase: beats global nav handler
    activePromptCancel = onNo;
  });
}

let shortcutRecording = null;

function setManualSyncButtons(syncing) {
  const buttons = [document.getElementById('syncHeaderBtn'), document.getElementById('syncNow')].filter(Boolean);
  for (const button of buttons) {
    button.disabled = syncing;
    button.title = syncing ? 'Syncing...' : 'Sync now';
    button.setAttribute('aria-label', button.title);
  }
}

function manualSyncResultText(result) {
  const ms = result && typeof result.ms === 'number' ? result.ms : 0;
  const elapsed = ms >= 1000 ? `${(ms / 1000).toFixed(1)}s` : `${ms}ms`;
  const changed = result && result.local_changed ? 'updated local' : result && result.wrote_remotes ? 'wrote cloud' : 'up to date';
  return `Synced: ${changed} (${elapsed})`;
}

function p2pStatusText(status) {
  if (!status || !status.enabled) return 'Off';
  if (!status.running) return 'Starting local network sync...';
  const peers = Array.isArray(status.peers) ? status.peers : [];
  if (!peers.length) return 'On; looking for nearby BoardClip devices';
  const names = peers.slice(0, 3).map(peer => peer.deviceName || 'Device').join(', ');
  const extra = peers.length > 3 ? ` +${peers.length - 3}` : '';
  return `On; ${peers.length} peer${peers.length === 1 ? '' : 's'} nearby: ${names}${extra}`;
}

function renderP2PStatus(status) {
  const statusEl = document.getElementById('p2pStatus');
  if (!statusEl) return;
  statusEl.textContent = p2pStatusText(status);
  statusEl.className = 'sync-status' + (status && status.enabled && status.running ? ' active' : '');
}

async function runManualSync({ showSettingsStatus = false } = {}) {
  if (manualSyncInFlight) return;
  manualSyncInFlight = true;
  setManualSyncButtons(true);
  const syncStatus = document.getElementById('syncStatus');
  if (showSettingsStatus && syncStatus) {
    syncStatus.textContent = 'Syncing...';
    syncStatus.className = 'sync-status active';
  }
  try {
    const result = await window.api.syncNow();
    await refresh();
    const statusText = manualSyncResultText(result);
    if (showSettingsStatus && syncStatus) {
      syncStatus.textContent = statusText;
      syncStatus.className = 'sync-status active';
      setTimeout(() => openSettings(), 500);
    } else {
      showToast(statusText);
    }
  } catch (error) {
    if (showSettingsStatus && syncStatus) {
      syncStatus.textContent = 'Sync failed';
      syncStatus.className = 'sync-status error';
    } else {
      showToast('Sync failed');
    }
  } finally {
    manualSyncInFlight = false;
    setManualSyncButtons(false);
  }
}

function shortcutLabel(accelerator) {
  return String(accelerator || '')
    .replace(/Globe|Fn/g, 'Globe')
    .replace(/CommandOrControl/g, window.api.platform === 'darwin' ? 'Cmd/Ctrl' : 'Ctrl')
    .replace(/Command/g, 'Cmd')
    .replace(/Control/g, 'Ctrl')
    .replace(/Super/g, window.api.platform === 'darwin' ? 'Cmd' : 'Win')
    .replace(/\+/g, ' + ');
}

function shortcutStatusEl(kind) {

function shortcutRecordEl(kind) {

function renderShortcutSettings(settings, { clearStatus = true } = {}) {

  const record = shortcutRecordEl('show');

  record.textContent = shortcutLabel(info.show);
  record.title = info.show;
  record.classList.remove('recording');
  reset.style.visibility = info.custom ? 'visible' : 'hidden';
  const quickRecord = shortcutRecordEl('quickPaste');
  const quickReset = shortcutResetEl('quickPaste');
  const quickShortcut = info.quickPaste || '';
  if (quickShortcut) {
    quickRecord.textContent = `${shortcutLabel(quickShortcut).replace(/\s\+\s[1-9]$/, '')} + 1-9`;
    quickRecord.title = `${quickShortcut.replace(/[1-9]$/, '1')} ... ${quickShortcut.replace(/[1-9]$/, '9')}`;
  } else {
    quickRecord.textContent = 'Off';
    quickRecord.title = 'Record quick paste shortcut';
  }
  quickRecord.classList.remove('recording');
  quickReset.style.visibility = info.quickPasteCustom ? 'visible' : 'hidden';
  if (clearStatus) {
    setShortcutStatus('show', '');
    setShortcutStatus('quickPaste', '');
  }
}

function shortcutKeyFromEvent(e) {
  const modifierKeys = new Set(['Alt', 'AltGraph', 'Control', 'Meta', 'Shift']);
  if (modifierKeys.has(e.key)) return '';
  if (/^Key[A-Z]$/.test(e.code)) return e.code.slice(3);
  if (/^Digit[0-9]$/.test(e.code)) return e.code.slice(5);
  if (/^Numpad[0-9]$/.test(e.code)) return `num${e.code.slice(6)}`;
  if (/^F([1-9]|1[0-9]|2[0-4])$/.test(e.key)) return e.key.toUpperCase();
  const byCode = {
    Minus: 'Minus',
    Equal: e.shiftKey ? 'Plus' : '=',
    BracketLeft: '[',
    BracketRight: ']',
    Backslash: 'Backslash',
    Semicolon: ';',
    Quote: "'",
    Backquote: '`',
    Comma: ',',
    Period: '.',
    Slash: '/',
    NumpadAdd: 'Plus',
    NumpadSubtract: 'Minus',
    NumpadMultiply: '*',
    NumpadDivide: '/',
    NumpadDecimal: '.',
  };
  if (byCode[e.code]) return byCode[e.code];
  const byKey = {
    ' ': 'Space',
    Spacebar: 'Space',
    Tab: 'Tab',
    Enter: 'Enter',
    Return: 'Enter',
    Backspace: 'Backspace',
    Delete: 'Delete',
    Insert: 'Insert',
    Home: 'Home',
    End: 'End',
    PageUp: 'PageUp',
    PageDown: 'PageDown',
    ArrowUp: 'Up',
    ArrowDown: 'Down',
    ArrowLeft: 'Left',
    ArrowRight: 'Right',
    CapsLock: 'Capslock',
    NumLock: 'Numlock',
    ScrollLock: 'Scrolllock',
    '+': 'Plus',
    '-': 'Minus',
  };
  return byKey[e.key] || '';
}

function shortcutFromEvent(e) {
  const mods = [];
  if (e.metaKey) mods.push(window.api.platform === 'darwin' ? 'Command' : 'Super');
  if (e.ctrlKey) mods.push('Control');
  if (e.altKey) mods.push('Alt');
  if (e.shiftKey) mods.push('Shift');
  const key = shortcutKeyFromEvent(e);
  if (!key || !mods.length) return '';
  return [...mods, key].join('+');
}

async function applyShortcut(kind, shortcut) {
  stopShortcutRecording({ resume: false });
  const result = kind === 'quickPaste'
    ? await window.api.setQuickPasteShortcut(shortcut)
    : await window.api.setShowShortcut(shortcut);
  if (!result || !result.ok) {
    const settings = await window.api.getSettings().catch(() => null);
    if (settings) renderShortcutSettings(settings, { clearStatus: false });
    setShortcutStatus(kind, result && result.error ? result.error : 'Shortcut was not saved.', true);
    return;
  }
  const settings = await window.api.getSettings();
  renderShortcutSettings(settings);
}

    await window.api.suspendShortcuts().catch(() => {});

  shortcutRecording = kind;
  const record = shortcutRecordEl(kind);
  record.classList.add('recording');
  record.textContent = 'Press keys';
  setShortcutStatus(kind, '');
}

document.addEventListener('keydown', async (e) => {
  if (!shortcutRecording) return;

function shortCommit(sha) {
  return sha ? String(sha).slice(0, 7) : '';
}

function updateUnavailableText(reason) {
  switch (reason) {
    case 'dirty-checkout':
      return 'Source checkout has local changes; run the public update command';
    case 'not-git-checkout':
      return 'Packaged build; source auto-update unavailable';
    case 'missing-update-script':
      return 'Source update script missing';
    case 'unknown-build':
      return 'Build commit unknown';
    default:
      return 'Source auto-update unavailable';
  }
}

function updateStatusText(result) {
  const latest = shortCommit(result && result.latest);
  switch (result && result.status) {
    case 'current':
      return 'Up to date';
    case 'updating':
      return latest ? `Updating to ${latest}...` : 'Updating...';
    case 'reloaded':
      return latest ? `Updated UI to ${latest}` : 'Updated UI';
    case 'relaunching':
      return latest ? `Updated to ${latest}; relaunching...` : 'Updated; relaunching...';
    case 'unsupported':
      return updateUnavailableText(result && result.reason);
    case 'busy':
      return 'Update check already running';
    case 'error':
      return result.error ? `Update check failed: ${result.error}` : 'Update check failed';
    default:
      return 'Could not determine latest version';
  }
}

function setUpdateStatus(message, state = '') {
  const updateStatus = document.getElementById('updateStatus');
  updateStatus.textContent = message || '';
  updateStatus.className = `settings-status${state ? ` ${state}` : ''}`;
}

function renderUpdateSettings(settings) {
  const support = settings.runtime_info && settings.runtime_info.update_support || {};
  const supported = !!(settings.runtime_info && settings.runtime_info.auto_update);
  const updateBuild = document.getElementById('updateBuild');
  const updateDetail = document.getElementById('updateDetail');
  const updateNow = document.getElementById('updateNow');
  const label = settings.build_info && settings.build_info.label ? settings.build_info.label : 'unknown';
  updateBuild.textContent = `Build ${label}`;
  updateDetail.textContent = supported
    ? 'Source auto-update enabled; requires Git; checks startup + every 4h'
    : updateUnavailableText(support.reason);
  updateNow.disabled = !supported;
  setUpdateStatus('', '');
}

document.getElementById('updateNow').addEventListener('click', async () => {
  const updateNow = document.getElementById('updateNow');
  updateNow.disabled = true;
  setUpdateStatus('Checking...', 'active');
  try {
    const result = await window.api.checkForUpdates();
    const state = result.ok || result.status === 'busy' ? 'active' : 'error';
    setUpdateStatus(updateStatusText(result), state);
    if (result.status !== 'updating') updateNow.disabled = false;
  } catch (error) {
    setUpdateStatus(`Update check failed: ${error && error.message ? error.message : 'unknown error'}`, 'error');
    updateNow.disabled = false;
  }
});

async function openSettings() {
  const s = await window.api.getSettings();
  const autoLaunchEl = document.getElementById('autoLaunch');
  autoLaunchEl.checked = await window.api.getAutoLaunch();
  autoLaunchEl.onchange = (e) => window.api.setAutoLaunch(e.target.checked);
  renderShortcutSettings(s);
  const maxAgeEl = document.getElementById('maxAge');
  const maxSizeEl = document.getElementById('maxSize');
  maxAgeEl.value = s.max_age_days;
  maxSizeEl.value = s.max_size_gb;
  maxAgeEl.onchange = () => window.api.saveSettings({ max_age_days: parseInt(maxAgeEl.value) || 7 });
  maxSizeEl.onchange = () => window.api.saveSettings({ max_size_gb: parseFloat(maxSizeEl.value) || 10 });
  const diagnosticsEl = document.getElementById('diagnosticsEnabled');
  const diagnosticsStatus = document.getElementById('diagnosticsStatus');
  const diagnosticsFile = s.runtime_info && s.runtime_info.diagnostics_file || '';
  const updateDiagnosticsStatus = () => {
    diagnosticsStatus.textContent = diagnosticsEnabled ? 'Writing performance log' : 'Off';
    diagnosticsStatus.title = diagnosticsEnabled ? diagnosticsFile : '';
    diagnosticsStatus.className = `settings-status${diagnosticsEnabled ? ' active' : ''}`;
  };
  diagnosticsEnabled = !!s.diagnostics_enabled;
  diagnosticsEl.checked = diagnosticsEnabled;
  updateDiagnosticsStatus();
  diagnosticsEl.onchange = async (e) => {
    diagnosticsEnabled = !!e.target.checked;
    await window.api.saveSettings({ diagnostics_enabled: diagnosticsEnabled });
    updateDiagnosticsStatus();
  };
  regexOn = s.regex_search || false;
  regexBtn.classList.toggle('active', regexOn);
  const bytes = s.storage_bytes || 0;
  const mb = (bytes / 1048576).toFixed(1);
  document.getElementById('usage').textContent = `Current: ${s.item_count} items, ${mb} MB`;

  // Native cloud providers are default-on; toggles are local opt-outs.
  const syncList = document.getElementById('syncAccounts');
  const accounts = await window.api.getCloudAccounts();
  syncList.innerHTML = '';
  for (const acc of accounts) {
    const row = document.createElement('label');
    row.className = 'sync-account';
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.dataset.syncPath = acc.path;
    checkbox.checked = !!acc.enabled;
    const main = document.createElement('span');
    main.className = 'sync-account-main';
    const label = document.createElement('span');
    label.className = 'sync-provider';
    label.title = syncAccountLabel(acc);
    label.textContent = syncAccountLabel(acc);
    const pathLabel = document.createElement('span');
    pathLabel.className = 'sync-account-path';
    pathLabel.title = acc.path;
    pathLabel.textContent = acc.path;
    main.append(label, pathLabel);
    row.append(checkbox, main);
    syncList.appendChild(row);
  }
  if (!accounts.length) {
    syncList.innerHTML = '<div class="sync-status">No native cloud folders detected</div>';
  }
  const enabledAccounts = accounts.filter(acc => acc.enabled);
  const syncStatus = document.getElementById('syncStatus');
  syncStatus.textContent = accounts.length ? `${enabledAccounts.length}/${accounts.length} providers enabled; syncs on change + every 30s` : '';
  syncStatus.className = 'sync-status' + (enabledAccounts.length ? ' active' : '');
  const p2pEnabledEl = document.getElementById('p2pEnabled');
  const p2pRuntime = s.runtime_info && s.runtime_info.p2p || { enabled: !!s.p2p_enabled };
  p2pEnabledEl.checked = !!p2pRuntime.enabled;
  renderP2PStatus(p2pRuntime);
  p2pEnabledEl.onchange = async (event) => {
    const nextEnabled = !!event.target.checked;
    renderP2PStatus({ enabled: nextEnabled, running: false, peers: [] });
    const status = await window.api.setP2PEnabled(nextEnabled);
    renderP2PStatus(status);
  };
  renderUpdateSettings(s);
  const buildInfoEl = document.getElementById('buildInfo');
  buildInfoEl.innerHTML = '';
  if (s.runtime_info && s.runtime_info.app_dir) {
    const line = document.createElement('span');
    line.className = 'build-info-line';
    line.title = s.runtime_info.app_dir;
    line.textContent = `App ${s.runtime_info.app_dir}`;
    buildInfoEl.appendChild(line);
  }

  // Numpad slots
  const slotsEl = document.getElementById('numpadSlots');
  const nmap = numpadMap();
  slotsEl.innerHTML = '';
  for (let n = 1; n <= 9; n++) {
    const has = n in nmap;
    const it = has ? itemById(nmap[n]) : null;
    const text = it ? (it.type === 'image' ? '[image]' : (it.text||'').replace(/\n/g,' ').slice(0,60)) : '';
    slotsEl.innerHTML += `<div class="np-slot${has?' has-content':''}" data-slot-id="${has ? esc(nmap[n]) : ''}">
      <span class="np-num">${n}</span>
      <span class="np-text${has?'':' empty'}">${has ? esc(text) : 'empty'}</span>
      ${has ? `<button class="icon-btn np-remove" data-slot="${n}" title="Unassign"><span class="mi">close</span></button>` : ''}
    </div>`;
  }
  slotsEl.querySelectorAll('.np-remove').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      await window.api.numpadUnassign(+btn.dataset.slot);
      await refresh();
      openSettings();
    });
  });
  slotsEl.querySelectorAll('.np-slot.has-content').forEach(slot => {
    slot.addEventListener('click', async () => {
      const id = slot.dataset.slotId;
      const it = itemById(id);
      if (!it) return;
      if (it.type === 'image') {
        await window.api.paste(id);
      } else {
        await window.api.copy(it.text || '');
      }
      showToast('Copied');
    });
  });

  // Group slots
  const groupsEl = document.getElementById('groupSlots');
  groupsEl.innerHTML = '';
  groups.forEach(g => {
    const count = groupCounts.get(g) || 0;
    groupsEl.innerHTML += `<div class="group-slot">
      <span class="gp-name">${esc(g)}</span>
      <span class="gp-count">${count} item${count!==1?'s':''}</span>
      <button class="icon-btn gp-del" data-group="${esc(g)}" title="Delete group"><span class="mi">close</span></button>
    </div>`;
  });
  groupsEl.querySelectorAll('.gp-del').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const g = btn.dataset.group;
      activeFilters.delete(g);
      await window.api.groupDelete(g);
      await refreshGroupsAndList();
      openSettings();
    });
  });

  document.getElementById('mainView').classList.add('hidden');
  document.getElementById('settingsView').classList.add('show');
}

function closeSettings() {
  document.getElementById('settingsView').classList.remove('show');
  document.getElementById('mainView').classList.remove('hidden');
  searchEl.focus();
}


// --- Groups refresh ---
async function refreshGroups({render = true} = {}) {
  const startedAt = performance.now();
  try {
    const s = await window.api.getSettings();
    groups = s.groups || [];
    diagnosticsEnabled = !!s.diagnostics_enabled;
    if (render) renderGroupFilters();
    recordRendererPerf('settings.refresh_groups', startedAt, { groups: groups.length, render }, 75);
  } catch {}
}

async function refreshGroupsAndList() {
  await refreshGroups({render: false});
  await refresh({force: true});
}

// --- Data refresh ---
async function refresh({force = false} = {}) {
  const startedAt = performance.now();
  try {
    const state = window.api.getHistoryState ? await window.api.getHistoryState() : {revision: Date.now(), items: await window.api.getHistory()};
    const data = state.items || [];
    const changed = state.revision !== dataRevision;
    if (changed) {
      dataRevision = state.revision;
      items = data;
      rebuildItemIndexes();
    }
    if (changed || force) rerenderList();
    recordRendererPerf('history.refresh', startedAt, { changed, force, revision: state.revision }, 100);
  } catch {}
}

// Initial load + poll
refreshGroupsAndList();
if (window.api.onHistoryChanged) {
  window.api.onHistoryChanged(() => refreshGroupsAndList());
} else {
  setInterval(refresh, 1000);
}

// --- Focus/blur integration ---
window.addEventListener('focus', () => {
  refreshGroupsAndList();
  setTimeout(() => searchEl.focus(), 50);
});
window.addEventListener('blur', () => {
  // Popup auto-hides via Electron's blur handler on the BrowserWindow
});
</script></body></html>
